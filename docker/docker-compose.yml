name: air-quality-realtime

# Template commun aux 4 services applicatifs (DRY via ancre YAML).
# Ils partagent la même image. IMPORTANT : un SEUL service porte le `build`
# (le producer) pour éviter que 4 builds parallèles ne se télescopent à
# l'export du même tag. Les autres réutilisent l'image déjà construite.
x-app: &app
  image: air-quality-realtime:latest
  networks:
    - redpanda_network
  depends_on:
    redpanda-0:
      condition: service_healthy   # on attend que le broker soit vraiment prêt
  restart: unless-stopped

networks:
  redpanda_network:
    driver: bridge

volumes:
  redpanda-0: null
  duckdb-data: null   # fichier DuckDB partagé entre le sink (écrit) et le dashboard (lit)

services:
  # --- Broker Redpanda (compatible Kafka) ---------------------------------
  redpanda-0:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.9
    container_name: redpanda-0
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      # Adresses annoncées aux clients :
      # - internal  -> depuis le réseau Docker (ex. la console, le producer dockerisé)
      # - external  -> depuis ta machine hôte (uv run aq-producer) sur localhost:19092
      - --advertise-kafka-addr internal://redpanda-0:9092,external://127.0.0.1:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda-0:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda-0:33145
      - --advertise-rpc-addr redpanda-0:33145
      - --mode dev-container   # config simplifiée pour le développement local
      - --smp 1                # 1 cœur CPU (suffisant en dev)
      - --default-log-level=info
    volumes:
      - redpanda-0:/var/lib/redpanda/data
    networks:
      - redpanda_network
    ports:
      - "18081:18081"   # Schema Registry
      - "18082:18082"   # HTTP Proxy (pandaproxy)
      - "19092:19092"   # API Kafka (accès depuis l'hôte)
      - "19644:9644"    # API Admin / metrics
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- Console web Redpanda (UI pour explorer topics et messages) ----------
  console:
    image: docker.redpanda.com/redpandadata/console:v3.7.3
    container_name: redpanda-console
    networks:
      - redpanda_network
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda-0:9092"]
        schemaRegistry:
          enabled: true
          urls: ["http://redpanda-0:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda-0:9644"]
    ports:
      - "8080:8080"     # Console accessible sur http://localhost:8080
    depends_on:
      redpanda-0:
        condition: service_healthy

  # --- Producer : émet les relevés vers Redpanda --------------------------
  # Seul service à porter le `build` : il construit l'image partagée.
  producer:
    <<: *app
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: aq-producer
    command: aq-producer
    environment:
      # IMPORTANT : depuis le réseau Docker on vise le listener INTERNAL.
      KAFKA_BOOTSTRAP_SERVERS: redpanda-0:9092
      SOURCE: simulated

  # --- Processor : détecte les dépassements de seuils ---------------------
  processor:
    <<: *app
    container_name: aq-processor
    command: aq-processor
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda-0:9092

  # --- Sink : persiste relevés et alertes dans DuckDB ---------------------
  sink:
    <<: *app
    container_name: aq-sink
    command: aq-sink
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda-0:9092
      DUCKDB_PATH: data/air_quality.duckdb
    volumes:
      - duckdb-data:/app/data

  # --- Dashboard : visualisation temps réel (lit DuckDB) ------------------
  dashboard:
    <<: *app
    container_name: aq-dashboard
    command: >
      streamlit run src/air_quality_realtime/dashboard/app.py
      --server.address=0.0.0.0 --server.port=8501 --server.headless=true
    environment:
      DUCKDB_PATH: data/air_quality.duckdb
    volumes:
      - duckdb-data:/app/data   # même volume que le sink (lecture seule côté app)
    ports:
      - "8501:8501"             # http://localhost:8501
